spring:
  # Spring Data JPA
  jpa:
    show-sql: 'false'
    hibernate:
      ddl-auto: update
    open-in-view: 'false'
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true # SQL 포맷팅
        highlight_sql: true # ANSI 코드에 색을 나타냄
        use_sql_comments: true # SQL 내부에 /* */ 주석 추가

  # .env import
  config:
    import: optional:file:./.env[.properties]

  # Database
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER}
    password: ${DB_PASS}
    url: ${DB_URL}
    hikari:
      maximum-pool-size: 10
      max-lifetime: 27000000  # 27000ms = 27000초 = 7.5시간
      idle-timeout: 60000      # 유휴 커넥션 1분 후 제거
      connection-timeout: 30000 # 커넥션 요청 최대 대기 시간 30초
      validation-timeout: 5000  # 커넥션 검증 타임아웃 5초


  # Jwt
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_EXPIRATION}

# logging
logging:
  level:
    org:
      springframework:
        core:
          LocalVariableTableParameterNameDiscoverer: error
      hibernate:
        sql: debug
        type.descriptor.sql: trace # 파라미터 값 추가
        sql.results.internal.ResultsHelper: INFO # OneToMany 조회 관련 로그 숨김
    p6spy:

# p6spy log
decorator:
  datasource:
    p6spy:
      enable-logging: false

# Swagger 설정 추가
springdoc:
  show-login-endpoint: true
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v1/api-docs

rabbitmq:
  host: ${RABBITMQ_HOST}
  port: ${RABBITMQ_PORT}
  virtual-host: ${RABBITMQ_VIRTUAL_HOST}
  username: ${RABBITMQ_USERNAME}
  password: ${RABBITMQ_PASSWORD}
  relay:
    port: ${RABBITMQ_RELAY_PORT}
    system-login: ${RABBITMQ_RELAY_SYSTEM_LOGIN}
    system-passcode: ${RABBITMQ_RELAY_SYSTEM_PASSCODE}
    client-login: ${RABBITMQ_RELAY_CLIENT_LOGIN}
    client-passcode: ${RABBITMQ_RELAY_CLIENT_PASSCODE}
  chat:
    queue:
      name: ${RABBITMQ_CHAT_QUEUE_NAME}
    exchange:
      name: ${RABBITMQ_CHAT_EXCHANGE_NAME}
    routing:
      key: ${RABBITMQ_CHAT_ROUTING_KEY}

# sms
coolsms:
  api-key: ${API_KEY}
  api-secret: ${API_SECRET}
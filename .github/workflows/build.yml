name: Build and Push Docker Image

on:
  push:
    branches:
      - develop   # 🟩 develop 브랜치로 직접 push될 때

  pull_request:
    # 🟦 PR이 생성, 코드 추가, 다시 열릴 때
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - develop   # 대상 브랜치가 develop일 때만

env:
  IMAGE_NAME: ghcr.io/remicare/back-02
  IMAGE_TAG: latest

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    # GHCR에 이미지를 올리기 위한 권한 설정
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean build
        run: ./gradlew clean

      - name: Build without tests
        run: ./gradlew bootJar -x test

      # GitHub 자체 토큰으로 로그인합니다. (별도 Secret 등록 필요 없음)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Tag Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:1.0 .
          docker tag ${{ env.IMAGE_NAME }}:1.0 ${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:1.0
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Notify
        run: echo "✅ Build and Docker image pushed to GHCR successfully."